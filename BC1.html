<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>බෞද්ධ ශිෂ්ටාචාරය — A/L පුනරීක්ෂණ මිණිපහන</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Sinhala:wght@400;600;700&family=Noto+Sans+Sinhala:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1c1410;
    --leaf:#2b211a;
    --panel:#33261e;
    --panel-2:#3d2c22;
    --gold:#c9a227;
    --gold-soft:#e2c568;
    --maroon:#7a2230;
    --maroon-soft:#9c3242;
    --cream:#efe4cd;
    --cream-dim:#bfae91;
    --good:#4f8b5e;
    --bad:#a4453f;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse at 20% -10%, rgba(201,162,39,0.10), transparent 45%),
      radial-gradient(ellipse at 100% 110%, rgba(122,34,48,0.18), transparent 50%),
      var(--ink);
    color:var(--cream);
    font-family:'Noto Sans Sinhala','Noto Sans',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:28px 16px 60px;
  }
  .stage{ width:100%; max-width:760px; }

  /* Header */
  .masthead{
    text-align:center;
    margin-bottom:22px;
  }
  .masthead .eyebrow{
    font-size:12.5px;
    letter-spacing:.14em;
    color:var(--gold-soft);
    text-transform:uppercase;
    display:block;
    margin-bottom:6px;
  }
  .masthead h1{
    font-family:'Noto Serif Sinhala',serif;
    font-weight:700;
    font-size:clamp(24px,5vw,34px);
    margin:0 0 6px;
    color:var(--cream);
    line-height:1.25;
  }
  .masthead p{
    margin:0;
    color:var(--cream-dim);
    font-size:14.5px;
  }
  .lotus-rule{
    display:flex; align-items:center; gap:10px;
    margin:16px auto 0; width:min(320px,80%);
  }
  .lotus-rule .ln{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
  .lotus-rule svg{width:20px;height:20px;flex-shrink:0;}

  /* Bead progress track */
  .bead-track{
    display:flex;
    gap:5px;
    flex-wrap:wrap;
    justify-content:center;
    padding:16px 14px;
    background:var(--leaf);
    border:1px solid rgba(201,162,39,0.18);
    border-radius:999px;
    margin:22px 0 26px;
  }
  .bead{
    width:11px; height:11px; border-radius:50%;
    background:#54453a;
    cursor:pointer;
    border:none;
    padding:0;
    transition:transform .15s ease, background .2s ease;
    flex-shrink:0;
  }
  .bead:hover{transform:scale(1.25);}
  .bead.current{background:var(--gold); transform:scale(1.4); box-shadow:0 0 0 3px rgba(201,162,39,0.25);}
  .bead.answered{background:var(--gold-soft);}
  .bead.answered.wrong{background:var(--maroon-soft);}

  /* Card */
  .card{
    background:linear-gradient(180deg,var(--panel-2),var(--panel));
    border:1px solid rgba(201,162,39,0.16);
    border-radius:var(--radius);
    padding:26px 24px 22px;
    box-shadow:0 18px 40px -18px rgba(0,0,0,0.6);
  }
  .qmeta{
    display:flex; justify-content:space-between; align-items:baseline;
    margin-bottom:12px;
  }
  .qnum{
    font-family:'Noto Serif Sinhala',serif;
    color:var(--gold-soft);
    font-size:15px;
    font-weight:600;
    letter-spacing:.02em;
  }
  .qcount{ color:var(--cream-dim); font-size:13px; }
  .qtext{
    font-size:17.5px;
    line-height:1.7;
    margin:0 0 20px;
    color:var(--cream);
  }
  .options{ display:flex; flex-direction:column; gap:10px; }
  .opt{
    display:flex;
    align-items:flex-start;
    gap:12px;
    text-align:left;
    width:100%;
    padding:13px 15px;
    background:rgba(239,228,205,0.03);
    border:1px solid rgba(239,228,205,0.14);
    border-radius:10px;
    color:var(--cream);
    font-family:inherit;
    font-size:15.5px;
    line-height:1.55;
    cursor:pointer;
    transition:border-color .15s ease, background .15s ease, transform .1s ease;
  }
  .opt:hover{ border-color:var(--gold); background:rgba(201,162,39,0.08); }
  .opt .tag{
    flex-shrink:0;
    width:26px;height:26px;
    border-radius:50%;
    border:1px solid rgba(239,228,205,0.35);
    display:flex;align-items:center;justify-content:center;
    font-size:12.5px; color:var(--cream-dim);
    margin-top:1px;
  }
  .opt.selected{ border-color:var(--gold); background:rgba(201,162,39,0.14); }
  .opt.selected .tag{ background:var(--gold); border-color:var(--gold); color:var(--ink); font-weight:700;}
  .opt[disabled]{ cursor:default; }
  .opt.correct{ border-color:var(--good); background:rgba(79,139,94,0.16); }
  .opt.correct .tag{ background:var(--good); border-color:var(--good); color:#fff; }
  .opt.incorrect{ border-color:var(--bad); background:rgba(164,69,63,0.16); }
  .opt.incorrect .tag{ background:var(--bad); border-color:var(--bad); color:#fff; }

  .navrow{
    display:flex; justify-content:space-between; align-items:center;
    margin-top:22px;
  }
  .btn{
    font-family:inherit;
    font-size:14.5px;
    padding:11px 20px;
    border-radius:999px;
    border:1px solid rgba(239,228,205,0.25);
    background:transparent;
    color:var(--cream);
    cursor:pointer;
    transition:all .15s ease;
  }
  .btn:hover{ border-color:var(--gold); color:var(--gold-soft); }
  .btn:disabled{ opacity:.35; cursor:not-allowed; }
  .btn.primary{
    background:linear-gradient(180deg,var(--gold-soft),var(--gold));
    color:var(--ink);
    border:none;
    font-weight:600;
  }
  .btn.primary:hover{ filter:brightness(1.06); color:var(--ink); }
  .btn.ghost-maroon{
    border-color:rgba(122,34,48,0.5);
    color:var(--cream-dim);
  }

  /* Results */
  .results-head{ text-align:center; margin-bottom:20px; }
  .score-ring{
    width:150px; height:150px; margin:0 auto 14px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background:conic-gradient(var(--gold) calc(var(--pct) * 1%), rgba(239,228,205,0.08) 0);
    position:relative;
  }
  .score-ring::before{
    content:''; position:absolute; inset:10px; border-radius:50%;
    background:var(--leaf);
  }
  .score-ring .num{ position:relative; font-family:'Noto Serif Sinhala',serif; font-size:30px; font-weight:700; color:var(--cream); }
  .score-sub{ color:var(--cream-dim); font-size:14px; }

  .review-item{
    border-top:1px solid rgba(239,228,205,0.1);
    padding:16px 0;
  }
  .review-item:first-child{ border-top:none; }
  .review-item .rq{ font-size:15px; line-height:1.6; margin-bottom:8px; }
  .review-item .rline{ font-size:13.5px; display:flex; gap:6px; margin-bottom:3px; }
  .review-item .rline .lab{ color:var(--cream-dim); min-width:74px; flex-shrink:0; }
  .review-item .rline.wrong .val{ color:#e08b83; }
  .review-item .rline.right .val{ color:#8fd19e; }
  .review-item .badge{
    display:inline-block; font-size:11.5px; padding:2px 9px; border-radius:999px;
    margin-left:8px; vertical-align:middle;
  }
  .badge.ok{ background:rgba(79,139,94,0.22); color:#8fd19e; }
  .badge.no{ background:rgba(164,69,63,0.22); color:#e08b83; }

  .filter-row{ display:flex; gap:8px; justify-content:center; margin:18px 0 6px; flex-wrap:wrap; }
  .chip{
    font-size:13px; padding:7px 14px; border-radius:999px;
    border:1px solid rgba(239,228,205,0.2); background:transparent; color:var(--cream-dim);
    cursor:pointer;
  }
  .chip.active{ background:var(--gold); color:var(--ink); border-color:var(--gold); font-weight:600;}

  footer.note{ text-align:center; color:var(--cream-dim); font-size:12.5px; margin-top:30px; line-height:1.7; }

  @media (max-width:480px){
    .card{ padding:20px 16px 18px; }
    .qtext{ font-size:16.5px; }
    .opt{ font-size:14.5px; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ transition:none !important; }
  }
</style>
</head>
<body>
<div class="stage">

  <div class="masthead">
    <span class="eyebrow">උසස් පෙළ · බුද්ධ ධර්මය</span>
    <h1>බෞද්ධ ශිෂ්ටාචාරයේ ඉතිහාසය</h1>
    <p>ප්‍රශ්න 50 කින් යුත් පුනරීක්ෂණ මිණිපහන — එක් වරකට එක් ප්‍රශ්නයක් බැගින්</p>
    <div class="lotus-rule">
      <span class="ln"></span>
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 21c-3.5-1.6-6-4.8-6-8.4C6 8.6 8.7 5 12 3c3.3 2 6 5.6 6 9.6 0 3.6-2.5 6.8-6 8.4z" stroke="#c9a227" stroke-width="1.2"/><path d="M12 21V9" stroke="#c9a227" stroke-width="1.2"/></svg>
      <span class="ln"></span>

  <div id="beadTrack" class="bead-track"></div>

  <div id="quizArea"></div>

  <footer class="note">තට්ටු කිරීමෙන් පිළිතුරු තෝරන්න · ඕනෑම මොහොතක ප්‍රශ්නයක් වෙනස් කළ හැක · අවසානයේදී සම්පූර්ණ විස්තරාත්මක සමාලෝචනයක් ලැබේ</footer>
</div>

<script>
const QUESTIONS = [
{q:"බ්‍රාහ්මණ සංස්කෘතියේ ප්‍රමුඛ ආගමික සංස්කාර විධියක් වූ යාග කර්මයේ වේදපාඨ ගායනා කරන්නා හඳුන්වා ඇත්තේ කවර නමකින් ද?",o:["හෝතා","අධ්වර්යු","උද්ගාතා","යඥකාරක","යඥග්‍රාහක"],c:2},
{q:"බ්‍රාහ්මණ ඉගැන්වීම් අනුව සන්න‍යාසි ආශ්‍රමයේදී සිදු කළයුතු ප්‍රධානතම කාර්යය ලෙස හඳුනා ගත හැක්කේ, බ්‍රහ්ම සහව‍ාසයට අපේක්ෂාවෙන්,",o:["වනගතව විසීමයි.","ස්තෝත්‍ර ගායනා කිරීමයි.","වේද අධ්‍යයනය කිරීමයි.","වතාවත් කිරීමයි.","අනාගාරිකව සංචාරක ජීවිතයක් ගත කිරීමයි."],c:4},
{q:"බුද්ධකාලීන ප්‍රකට ශාස්තෘවරුන් සිවුදෙනෙකුගේ ආගමික හා දාර්ශනික මතවාද කිහිපයක් පහත දැක්වේ. A - සත්ත්වයාගේ කෙලෙසීමට හෝ විශුද්ධියට හේතු ප්‍රත්‍යයක් නැත. B - පඨවි, ආපෝ, තේජෝ, වායෝ, සුඛ, දුක්ඛ, ජීව යනුවෙන් නොබිඳෙන, ස්ථිර වූ සප්ත පදාර්ථයක් ඇත. C - සියලු සත්ත්වයෝ අබල්‍ය, අවීරිය, ශක්ති නැත්තෝය. D - දුන්දෙයෙහි පලනැත, යාගයෙහි හෝ කුසලාකුසල කර්මයන්ගේ ඵලවිපාක නැත. E - චතුයාම සංවරයෙන් යුක්තව, පෙර කරන ලද කර්ම ගෙවා දැමීමෙන් සහ නවකර්ම නොකිරීමෙන් මෝක්ෂය ස්පර්ශ කළ හැකිය. ඉහත ප්‍රකාශ අතරින් මක්ඛලී ගෝසාලගේ ඉගැන්වීම් දෙක ඇතුළත් වරණය කුමක් ද?",o:["A සහ B","A සහ C","B සහ C","C සහ D","D සහ E"],c:1},
{q:"දානයෙන්, ඉන්ද්‍රිය දමනයෙන්, සංවරයෙන් හා සත්‍ය වචනයෙන් සිදුවන පිනක් නැත යන අකිරියවාදයක් ඉගැන්වූ බුද්ධකාලීන ශාස්තෘවරයා වූයේ,",o:["නිගණ්ඨනාතපුත්ත ය.","අජිත කේසකම්බල ය.","සංජය බෙල්ලට්ඨිපුත්ත ය.","පූරණ කස්සප ය.","පකුධ කච්චායන ය."],c:3},
{q:"බුද්ධකාලීන භාරතයේ රාජ්‍ය පාලකයන් හා බුදුරජාණන් වහන්සේ අතර සමීප සබඳතා පැවති බව ඓතිහාසික මූලාශ්‍රය පැහැදිලි කරයි. ඔවුන් අතරින් පසේනදී කොසොල් රජතුමාට ප්‍රමුඛස්ථානයක් හිමි වේ. ඒ බව වඩාත් හොඳින් තහවුරු කෙරෙන සිදුවීම කුමක් ද?",o:["වේළුවනාරාමය පූජා කිරීම.","රාජ භටයන් පැවිදි නොකරන ලෙස ඉල්ලීම.","උපෝසථ කර්මය අනුදැන වදාරන ලෙස ඉල්ලීම.","නිරෝධුවිත් සූත්‍රය දේශනා කිරීම.","කෝසල රාජ්‍යයේ වැඩිම අවුරුදු ගණනක් වස් විසීම."],c:4},
{q:"කෘෂිකර්මාන්තය දැහැමි ජීවනෝපායක් ලෙස අගය කරන බුදුසමය පාලකයා විසින් ගොවීන්ට බීජ ආදී අවශ්‍ය පහසුකම් සැපයීමෙන් අනුග්‍රහ දැක්විය යුතු බව .......................... සූත්‍රයේ දැක්වේ.",o:["කූටදන්ත","කසිභාරද්වාජ","අග්ගඤ්ඤ","චක්කවත්තිසීහනාද","ධනිය"],c:0},
{q:"බුද්ධකාලීන භාරතීය කාන්තාවට බුදුසමයෙන් හිමි කරදුන් ආගමික නිදහස තහවුරු කෙරෙන වඩාත්ම සුදුසු වරණය තෝරන්න.",o:["උපාසිකාවන්ට තනතුරු ප්‍රදානය කිරීම.","මව \"බ්‍රහ්ම\" නාමයෙන් හැඳින්වීම.","නිර්වාණාවබෝධයට ස්ත්‍රීත්වය බාධාවක් නොවන බව ප්‍රකාශ කිරීම.","භික්ෂුණී ශාසනය ස්ථාපනය කිරීම.","භික්ෂුණීන්ට ශාසනික තනතුරු ප්‍රදානය කිරීම."],c:2},
{q:"භව කතරින් එතෙර ලනුයෙන් සතන් හැමවර කිලෙසුරු මුනිවර .......................... යානාදී පද්‍යයෙන් විස්තර වන බුදුගුණය කුමක් ද?",o:["භගවා","සත්ථා","බුද්ධ","සුගත","සම්මාසම්බුද්ධ"],c:3},
{q:"\"නපානන්ද තථාගතස්ස ධම්මෙසු ආචරිය මුට්ඨි\" යන මහාපරිනිබ්බාන සූත්‍රයේ ඇතුළත් දේශනාව බුදුරජාණන් වහන්සේගේ .......................... ප්‍රකට කරයි.",o:["මහා ප්‍රඥාව","තාදී ගුණය","නිදහස් චින්තනය","විශිෂ්ට ශාස්තෘත්වය","මහා කරුණාව"],c:3},
{q:"පටිපුච්ඡා ව්‍යාකරණීය යනු බුදුරජාණන් වහන්සේ විසින් .......................... සඳහා භාවිත කරන ලද ක්‍රමවේදයකි.",o:["සවිස්තරව ධර්ම දේශනා කිරීම","කෙටියෙන් ධර්ම දේශනා කිරීම","නිවැරදිව භාෂාව හැසිර වීම","ශ්‍රාවකයාගේ බුද්ධියට ගැළපෙන සේ ධර්ම දේශනා කිරීම","ප්‍රශ්න විසඳීම"],c:4},
{q:"\"ලෝකයේ සුප්‍රසිද්ධ ආගම්වලින් මා බුදුදහමට, විශේෂයෙන් මුල් බුදුදහමට කැමතිවන්නේ එය කිසිවෙකු නොපෙළන බැවිනි.\" ඉහත ප්‍රකාශය කවරෙකු විසින් සිදු කරන ලද්දක් ද?",o:["බර්ට්‍රන්ඩ් රසල්","එඩ්වින් ආර්නෝල්ඩ්","මහාචාර්ය සෝල්ඩර්ස්","ඇල්බට් අයින්ස්ටයින්","මහාචාර්ය මැක්ස් මුලර්"],c:0},
{q:"පහත දැක්වෙන්නේ බුද්ධකාලීන බෞද්ධ උපාසිකාවන් පිළිබඳ ප්‍රකාශ කිහිපයකි. A - කොසොල් රජතුමා විසින් අසන ලද ප්‍රශ්නවලට දක්ෂ ලෙස පිළිතුරු දුන්නාය. B - ඇදහිය හැකි කතා ඇති උපාසිකාවන් අතර අග්‍රස්ථානය ලැබුවාය. C - පතිකුලයට යන විට පියාණන් විසින් දසවිධ අවවාද පිළිපැද්දාය. D - සොළොස් වසරක් තිස්සේ ගෘහස්ථ බ්‍රහ්මචරියාව ආරක්ෂා කළාය. E - දන්දීමේ ඇලුනු උපාසිකාවන් අතර අග්‍රස්ථානය ලැබුවාය. මේවා අතරින් විශාඛා මහෝපාසිකාව පිළිබඳ නිවැරදි ප්‍රකාශ දෙක .......................... වේ.",o:["A සහ B","A සහ C","B සහ C","C සහ D","C සහ E"],c:1},
{q:"ආචාරධර්ම පිළිබඳ බෞද්ධ ඉගැන්වීම් අනුව සචේතනික ක්‍රියාවේ .......................... කර්මය වෙත පැවරේ.",o:["වගකීම","චේතනාව","ස්වච්ඡන්දතාව","ස්වාධීනත්වය","අගයීම"],c:0},
{q:"පහතින් දැක්වෙන්නේ රාජ්‍ය පාලනය පිළිබඳ බෞද්ධ ඉගැන්වීම්වලට අදාළ ප්‍රකාශ පහකි. A - නිර්ධනයන්ට තමා අභිමත කර්මාන්ත ආදිය සඳහා ධනය ලබාදීම. B - විවාහක අවිවාහක කාන්තාවන්ට ආරක්ෂාව සැලසීම. C - අපරාධ මර්දනය කිරීම. D - පනවන ලද නීති කඩනොකොට ආරක්ෂා කිරීම. E - බහුශ්‍රැත මහණ බමුණන් වෙත එළඹ අවවාද අනුශාසනා ලබා ගැනීම. ඉහත සඳහන් ප්‍රකාශ අතරින් දසසක්විතිවත්වලට අයත් නොවන කරුණු දෙක ඇතුළත් වරණය තෝරන්න.",o:["A සහ B","B සහ C","B සහ D","C සහ D","D සහ E"],c:2},
{q:"රාජ්‍යයේ ප්‍රභවය පිළිබඳ අග්ගඤ්ඤ සූත්‍රගත ඉගැන්වීම් අනුව පාලකයා හා ජනතාව අතර ඇති වූ ගිවිසුමේ ප්‍රධානතම කොන්දේසිය ලෙස හඳුනාගත හැක්කේ,",o:["ක්‍ෂේත්‍රවල අයිතිය පාලකයා වෙත පවරා දීමයි.","මහජන සම්මතයෙන් පාලකයා පත්කර ගැනීමයි.","පාලකයා වෙත බදු ගෙවීමට මහජනතාව පොරොන්දු වීමයි.","මහජන මතයට කන් නොදෙන පාලකයා පලවා හැරීමේ බලය ජනතාව විසින් ලබා ගැනීමයි.","දසරාජ ධර්මවලට අනුගතව පාලන තන්ත්‍රය මෙහෙයවීමට පොරොන්දු වීමයි."],c:2},
{q:"අත්තකාර, පරකාර, ආරම්භධාතු, නික්කමධාතු, පරක්කමධාතු ආදී පාරිභාෂික වචන මගින් බුදුසමය අවධාරණය කරන ඉගැන්වීම සඳහා වඩාත් ගැළපෙන ප්‍රකාශය කුමක් ද?",o:["කර්ම විපාකයෙන් ගැලවීමට කිසිවෙකුට හැකියාවක් නැත.","පුද්ගල ස්වාධීනත්වය හා ශක්තිය මගින් පෞරුෂය ගොඩ නගාගත හැකිය.","පුද්ගලයා යනු හේතුඵල සම්බන්ධයේ ප්‍රතිඵලයකි.","ආත්මාර්ථය පිණිස මෙන්ම පරාර්ථය පිණිස ද එක සේ ක්‍රියා කළ යුතු ය.","බියජනක සසර ජය ගැනීමට නිරන්තරයෙන් ක්‍රියා කළ යුතු ය."],c:1},
{q:"බුද්ධකාලීන භාරතයේ පැවති ආගමික මතවාද කිහිපයක් පහත දැක්වේ. A - සංශයවාදය B - අමරා වික්ඛේපවාදය C - පුබ්බේකතහේතුවාදය D - හේතුවිලෝපවාදය E - ඊශ්වර නිර්මාණවාදය මෙම මතවාද අතරින් පුද්ගල ස්වාධීනත්වයට, ස්වාමිත්වයට හා ස්වච්ඡන්දතාවට බාධා පමුණුවන ඉගැන්වීම් දෙකක් ඇතුළත් වරණය තෝරන්න.",o:["A සහ B","B සහ D","C සහ D","C සහ E","D සහ E"],c:3},
{q:"පහත දැක්වෙන ප්‍රකාශ අතරින් හොඳ-නරක විනිශ්චයෙහිලා බෞද්ධ නිර්ණායකයක් ලෙස භාවිත කිරීමට වඩාත් සුදුසු වරණය තෝරන්න.",o:["තමාට තමා දීපයක් කොට, පහනක් කොට, සරණ කොට වාසය කරන්න.","තථාගතවරු මග පෙන්වන්නෝ වෙති. විමුක්තිය සාක්ෂාත් කිරීම ඔබගේ කටයුත්තකි.","තථාගත ධර්මය විවෘත වූ තරමට බැබළේ. වසා තැබීමෙන් නොබැබළේ.","කෙසේ, වචනයෙන්, මනසින් සංවරවීම මැනවි.","යම් ක්‍රියාවක් කොට පසුතැවීමට සිදුවේ ද, කඳුළුපිරි දෙනෙතින් විපාක විඳීමට සිදුවේ ද, එවැනි දෑ නොකටයුතු ය."],c:4},
{q:"\"පියානට බෙදා ගත් ආහාරයෙන් පවා කොටසක් දන් දී තිරිසන් සතෙකුගේ හෝ කුසගිනි නිවීමට උනන්දු වූ විදානෙ මාමා: සියලුදෙනාට දයාබර වදනින් ඇමතීමටත්, අවම වශයෙන් ප්‍රියමනාප සිනහවකින් හෝ සංග්‍රහ කිරීමටත් පුරුදුව සිටියේය...\" ඉහත ඡේදයේ සමස්ත අර්ථයට අනුව වඩාත් නිවැරදි ප්‍රකාශය වනුයේ, විදානෙ මාමා",o:["හොඳින් දන්දෙන්නෙක් බවයි.","ප්‍රිය වචනින් අන් අය ඇමතූ බවයි.","අන් අයගේ යහපත උදෙසාම කැප වූ බවයි.","උස් පහත් භේද නොසලකා කටයුතු කළ බවයි.","සතර සංග්‍රහ වස්තු හොඳින් ප්‍රගුණ කළ බවයි."],c:4},
{q:"පහත සඳහන් ප්‍රකාශ අතරින් බෞද්ධ ඉගැන්වීම්වලට අනුව සාවද්‍ය ප්‍රකාශය තෝරන්න.",o:["නීති ගරුකත්වය අපරිහානිය ධර්මයක් ලෙස බුදුසමයේ දැක්වේ.","සාමූහික පැවැත්ම උදෙසා නීති ගරුකත්වයේ අවශ්‍යතාව ශික්ෂාපද පැනවීමේ පරමාර්ථවලින් පැහැදිලි වේ.","අපරාධ වැළැක්වීමේ එකම පිළියම දඬුවම ලෙස බුදුසමය නොපිළිගනී.","අපරාධවලට හේතු සෙවීමට කාලය මිඩංගු නොකොට ඒවා මර්දනය කළ යුතුය.","සමාජ සම්මතයක් වූ නීතිය නොඉක්මවා ක්‍රියා කළ යුතුය."],c:3},
{q:"පහත දැක්වෙන වරණ අතරින් දසකුසල්වලට ඇතුළත් වනුයේ,",o:["බොරු නොකීම හා කේලාම් නොකීමයි.","දානය හා ශීලයයි.","පිං දීම හා පිං අනුමෝදන්වීමයි.","වතාවත් කිරීම හා ගරුබුහුමන් කිරීමයි.","බණකීම හා බණ ඇසීමයි."],c:0},
{q:"ධනසම්පත් කළමනාකරණය පැහැදිලි කෙරෙන බෞද්ධ සිද්ධාන්තයක් ලෙස හඳුනා ගැනීමට වඩාත් යෝග්‍ය වන්නේ .......................... පිළිබඳ ඉගැන්වීමයි.",o:["පාපමිත්‍ර","සමජීවිකතාව","අපාය මුඛ","භෝග සුඛ","සම්මා ආජීවය"],c:1},
{q:"බෞද්ධ ඉගැන්වීම් අනුව පුද්ගලයාගේ ආර්ථික සමෘද්ධියෙහිලා ශ්‍රමයේ ඇති වැදගත්කම පැහැදිලි කරන ඉගැන්වීමක් ලෙස සැලකිය හැක්කේ .......................... යන්නයි.",o:["\"අවජ්ජා බ්‍රහ්මචරියං අලද්ධ‍ා යොබ්බනේ ධනං\"","\"උට්ඨානවන්තෝ සතිමතෝ සුචිකම්මස්ස නිසම්මකාරිනෝ\"","\"බාහාබල පරිචිතේහි සේදා වක්ඛිත්තේහි ධම්මිකේහි ධම්මලද්ධේහි භෝගෙහි\"","\"න ඉච්ඡෙය්‍ය අගම්මෙන සමිද්ධිමත්තනො\"","\"අනව්ජ්ජානි කම්මානි\""],c:2},
{q:"බුදුරජාණන් වහන්සේ විසින් නිර්මාණාත්මක සෞන්දර්යය අගය කරන ලද අවස්ථාවක් නිරූපණය වන සූත්‍රයක් වන්නේ,",o:["ආටානාටිය සූත්‍රයයි.","ධනිය සූත්‍රයයි.","සක්කපඤ්හ සූත්‍රයයි.","අරිය පරියේසන සූත්‍රයයි.","මහාපරිනිබ්බාන සූත්‍රයයි."],c:2},
{q:"පරිසරය පිළිබඳ බුදුසමයේ අවධානය පැහැදිලි කෙරෙන ප්‍රකාශ කිහිපයක් පහත දැක්වේ. A - උද්‍යානකරණය හා වන වගාව දිවා රෑ පිං වැඩෙන පිනක් වේ. B - ජලයෙහි මළමුත්‍රා පහකිරීම, කෙළ ගැසීම, භික්ෂූන්ට ඇවැතකි. C - \"වනය (කෙලෙස්) සිඳින්න, ගස් කපන්න එපා.\" යන්න ප්‍රකට බෞද්ධ ඉගැන්වීමකි. D - නිල් තණ මත මළමුත්‍රා පහකිරීම, කෙළ ගැසීම, භික්ෂූන්ට ආපත්තියකි. E - සත්ත්වල් සිඳීම හා සියලු ආකාරයේ පැළවෙන බීජ සිඳීම භික්ෂූන්ට අකැපය. ඉහත ප්‍රකාශ පිළිබඳ අවධානය යොමු කරමින් පරිසර සංරක්ෂණයෙහිලා අනුබල දෙන කරුණු ඇතුළත් වඩාත් නිවැරදි වරණය තෝරන්න.",o:["A පමණි.","A, B පමණි.","A, B, C පමණි.","A, B, C, D පමණි.","A, B, C, D, E යන පහම වේ."],c:4},
{q:"\"අගධිතතෝ, අමුච්ඡිතෝ, අනජ්ඣාපන්නෝ, ආදීනව දස්සාවී, නිස්සරණ පඤ්ඤාය\" යන පාරිභාෂික වචනවලින් විග්‍රහ කර ඇත්තේ ධනය .......................... පිළිබඳ දැක්මයි.",o:["ඉපයීම","පරිභෝජනය","සංරක්ෂණය","ආයෝජනය","කළමනාකරණය"],c:1},
{q:"\"පාපා නිවාරෙන්ති\" යනු පවින් වැළැක්වීමයි. සිඟාලෝවාද සූත්‍රයට අනුව \"පවින් වැළැක්වීම\" යුතුකමක් ලෙස දක්වා ඇත්තේ,",o:["මහණ බමුණන්ගේ හා දෙමාපියන්ගේ ය.","මහණ බමුණන්ගේ හා ගුරුවරුන්ගේ ය.","මහණ බමුණන්ගේ හා මිත්‍රයන්ගේ ය.","දෙමාපියන්ගේ හා ගුරුවරුන්ගේ ය.","දෙමාපියන්ගේ හා මිත්‍රයන්ගේ ය."],c:0},
{q:"ආර්ථික සමෘද්ධිය අපේක්ෂා කරන ගෘහස්ථ බෞද්ධයා විසින් ආර්ථික සුරක්ෂිතතාව පිණිස භෝග විනාශ මුඛවලින් වැළකිය යුතු බව සිඟාලෝවාද සූත්‍රයේ දැක්වේ. භෝග විනාශය පිණිස සෘජුව හෝ වක්‍රව හේතුවන කරුණු පහක් පහත දැක්වේ. ඒවා අතරින් භෝග විනාශ මුඛයක් ලෙස සිඟාලෝවාද සූත්‍රයේ සඳහන් නොවන කරුණ කුමක් ද?",o:["රහමෙර පානය","පාපමිත්‍රසේවනය","අලසබව","පරදාරසේවනය","දූකෙළිය"],c:3},
{q:"\"ජීනේ කදරියං දානෙන\" යන ධම්මපද ගාථා පාඨයේ අර්ථය වනුයේ \"දානයෙන් .......................... දිනිය යුතුය\" යන්නයි.",o:["වෛරකරන්නා","මසුරා","පරලොව","නිවන","සියල්ල"],c:1},
{q:"\"අනාකුලා ච කම්මන්ත‍ා\" යන මංගලසූත්‍රගත පාඨයෙන් අර්ථවත් වනුයේ,",o:["නොකටයුතු කර්මාන්තවලින් වැළකීමයි.","නොකටයුතු වෙළෙඳාම්වලින් වැළකීමයි.","කුලයන්හි නොඇලී කටයුතු කිරීමයි.","දැහැමි ජීවන පිළිවෙතයි.","නිරවුල් කර්මාන්ත ඇති බවයි."],c:4},
{q:"බුදුරජාණන් වහන්සේ වෙත පූජා කරන ලද ආරාම කිහිපයක නම් පහතින් දැක්වේ. එම ආරාම නාමයන්ට ඉදිරියෙන් දැක්වෙන අදාළ ආරාම පූජාව සිදුකරන ලද පුද්ගල නාමවලින් දෙකක් පමණක් නිවැරදි ය. A - නිග්‍රෝධාරාමය - කපිලවත්තුපුර ශාක්‍යයන් B - රජකාරාමය - අනේපිඬු සිටුතුමා C - ජේතවනාරාමය - ජේත කුමරු D - පූර්වාරාමය - විශාඛා උපාසිකාව E - වේළුවනාරාමය - කොසොල් රජතුමා නිවැරදි යුගල දෙක ඇතුළත් වරණය තෝරන්න.",o:["A සහ B","A සහ C","A සහ D","C සහ D","C සහ E"],c:2},
{q:"ධර්මසංගායනා පැවැත්වීමට හේතු සාධක වූ කරුණු කිහිපයක් පහත දැක්වේ. A - සුභද්‍රගේ නොහික්මුණු ප්‍රකාශය B - වජ්ජිපුත්තක භික්ෂූන්ගේ දස වස්තුව C - විසිරී තිබූ ධර්මවිනය ඒකරාශී කිරීම D - දුසිල් මහණුන් සසුන්ගත වීම E - බුද්ධ වචනය විවිධාකාරයෙන් නිර්වචනය කිරීම ඉහත සඳහන් කරුණු අතරින් ප්‍රථම සංගායනාව පැවැත්වීම සඳහා බලපාන ලද හේතු දෙක ඇතුළත් වරණය තෝරන්න.",o:["A සහ B","A සහ C","C සහ D","C සහ E","D සහ E"],c:1},
{q:"නාලන්දා විශ්වවිද්‍යාලයේ අධ්‍යාපනය ප්‍රධාන විෂය ධාරා පහක් යටතේ සිදු වූ අතර බුද්ධ ධර්මය ඉන් එකකි. එම විෂය ධාරාවේ මූලික අරමුණ ලෙස හඳුනාගත හැක්කේ .......................... ඉගැන්වීමයි.",o:["මුල් බුදුදහම","ථෙරවාද බුදුදහම","අභිධර්මය","මහායාන ධර්මය","සර්වාස්තිවාදය"],c:3},
{q:"දෙවන ධර්ම සංගායනාව පැවැත්වීමට පෙර උබ්බාහිකාවක් පත්කරන ලද්දේ,",o:["සංගායනාව සඳහා භික්ෂූන් තෝරාගැනීමටයි.","දසවස්තුව විනිශ්චය කිරීමටයි.","දසවස්තුව පිළිගත් භික්ෂූන් හඳුනා ගැනීමටයි.","සංගායනාව සංවිධානය කිරීමටයි.","දසවස්තුව පිළිගත් භික්ෂූන්ට දඬුවම් කිරීමටයි."],c:1},

{q:"බුද්ධකාලීන භාරතයේ ධර්මප්‍රචාරයෙහිලා ශ්‍රාවකයන් වහන්සේලාගේ කාර්යභාරය ප්‍රමාණ කිරීමට කදිම සාක්ෂියක් ලෙස හඳුනා ගතහැකි සුනාපරන්ත ජනපදයේ ශාසන ව්‍යාප්තිය සිදුකළ ශ්‍රාවකයන් වහන්සේ වූයේ,",o:["පුණ්ණ හිමියන් ය.","සැරියුත් හිමියන් ය.","මුගලන් හිමියන් ය.","මහාකාශ්‍යප හිමියන් ය.","බක්කුල හිමියන් ය."],c:0},

{q:"අරිට්ඨ තෙරුන්ගේ මූලිකත්වයෙන් මහා විහාර භූමිය තුළ විනය සංගායනාවක් පැවැත්වීමේ මුඛ්‍ය පරමාර්ථය වූයේ,",o:["විනය ශාසනයේ ආයුෂ ලෙස අවධාරණය කිරීමයි.","මහා විහාරයට එල්ල වූ විවිධ අභියෝග වැළැක්වීමයි.","බුද්ධ ශාසනය ලක්දිව ප්‍රතිෂ්ඨාපනය කිරීමයි.","විනය පිළිබඳ ව පැවති සාවද්‍ය නිර්වචන බැහැර කිරීමයි.","පිරිහීමට පත්ව තිබූ භික්ෂු විනය යළි ස්ථාපනය කිරීමයි."],c:2},
{q:"බුදුසමය සමුප්‍රාප්තියත් සමග ශ්‍රී ලංකාවේ පැවති ඇදහිලි හා විශ්වාස කැපී පෙනෙන වෙනසකට භාජනය විය. ඊට අදාළ ප්‍රකාශ හතරක් පහත දැක්වේ. A - සියලු ඇදහිලි හා විශ්වාස සම්පූර්ණයෙන් අහෝසි විය. B - බොහෝ ඇදහිලි හා විශ්වාසවලට නව අර්ථකථන හිමිවිය. C - ඇතැම් ඇදහිලි හා විශ්වාස සම්පූර්ණයෙන් අහෝසි විය. D - ඇතැම් ඇදහිලි හා විශ්වාස බුදුසමයේ නොමඳ විචාරයට ලක්විය. ඉහත ප්‍රකාශ අතරින් දේශීය ඇදහිලි හා විශ්වාසවල සිදු වූ වෙනස්කම් දැක්විය හැකි වඩාත් ගැළපෙන ප්‍රකාශ දෙක ඇතුළත් වරණය තෝරන්න.",o:["A සහ B","A සහ D","B සහ C","B සහ D","C සහ D"],c:2},

}

function refreshBeads(){
  const beads = beadTrack.children;
  for(let i=0;i<beads.length;i++){
    const b = beads[i];
    b.classList.remove('current','answered','wrong');
    if(submitted){
      if(answers[i] !== null){
        b.classList.add('answered');
        if(answers[i] !== QUESTIONS[i].c) b.classList.add('wrong');
      }
    } else {
      if(i === current) b.classList.add('current');
      else if(answers[i] !== null) b.classList.add('answered');
    }
  }
}

function selectAnswer(qi, oi){
  if(submitted) return;
  answers[qi] = oi;
  refreshBeads();
  renderQuestion();
}

function renderQuestion(){
  const q = QUESTIONS[current];
  const chosen = answers[current];
  const optsHtml = q.o.map((text, oi)=>{
    const sel = chosen === oi ? 'selected' : '';
    return `<button class="opt ${sel}" onclick="selectAnswer(${current},${oi})">
      <span class="tag">${OPT_LABELS[oi]}</span><span>${text}</span>
    </button>`;
  }).join('');

  quizArea.innerHTML = `
    <div class="card">
      <div class="qmeta">
        <span class="qnum">ප්‍රශ්නය ${current+1}</span>
        <span class="qcount">${current+1} / ${QUESTIONS.length}</span>
      </div>
      <p class="qtext">${q.q}</p>
      <div class="options">${optsHtml}</div>
      <div class="navrow">
        <button class="btn" onclick="goPrev()" ${current===0?'disabled':''}>← පෙර ප්‍රශ්නය</button>
        ${current === QUESTIONS.length-1
          ? `<button class="btn primary" onclick="trySubmit()">ලකුණු බලන්න</button>`
          : `<button class="btn primary" onclick="goNext()">ඊළඟ ප්‍රශ්නය →</button>`}
      </div>
    </div>
  `;
}

function goPrev(){ if(current>0){ current--; render(); } }
function goNext(){ if(current<QUESTIONS.length-1){ current++; render(); } }

function trySubmit(){
  const unanswered = answers.filter(a=>a===null).length;
  if(unanswered > 0){
    const proceed = confirm('ඔබ ප්‍රශ්න ' + unanswered + 'කට තවම පිළිතුරු දී නැත. එසේම ඉදිරියට යන්නද?');
    if(!proceed) return;
  }
  submitted = true;
  current = -1;
  render();
}

function restart(){
  answers = new Array(QUESTIONS.length).fill(null);
  submitted = false;
  current = 0;
  reviewFilter = 'all';
  render();
}

function renderResults(){
  let score = 0;
  QUESTIONS.forEach((q,i)=>{ if(answers[i] === q.c) score++; });
  const pct = Math.round((score/QUESTIONS.length)*100);

  let verdict;
  if(pct >= 80) verdict = 'විශිෂ්ටයි — විභාගයට සූදානම් මට්ටමකි.';
  else if(pct >= 60) verdict = 'හොඳයි — තව ටිකක් සමාලෝචනය කරන්න.';
  else if(pct >= 40) verdict = 'මූලික අවබෝධයක් තිබේ — නැවත කියවා බලන්න.';
  else verdict = 'මේ පාඩම් කොටස් නැවත හොඳින් අධ්‍යයනය කරන්න.';

  const filterRow = `
    <div class="filter-row">
      <button class="chip ${reviewFilter==='all'?'active':''}" onclick="setFilter('all')">සියල්ල (${QUESTIONS.length})</button>
      <button class="chip ${reviewFilter==='wrong'?'active':''}" onclick="setFilter('wrong')">වැරදි (${QUESTIONS.length-score})</button>
      <button class="chip ${reviewFilter==='right'?'active':''}" onclick="setFilter('right')">නිවැරදි (${score})</button>
    </div>`;

  let reviewHtml = '';
  QUESTIONS.forEach((q,i)=>{
    const isCorrect = answers[i] === q.c;
    if(reviewFilter==='wrong' && isCorrect) return;
    if(reviewFilter==='right' && !isCorrect) return;
    const yourAns = answers[i]===null ? 'පිළිතුරු නොදුන්නා' : (OPT_LABELS[answers[i]] + '. ' + q.o[answers[i]]);
    const correctAns = OPT_LABELS[q.c] + '. ' + q.o[q.c];
    reviewHtml += `
      <div class="review-item">
        <div class="rq">${i+1}. ${q.q} <span class="badge ${isCorrect?'ok':'no'}">${isCorrect?'නිවැරදි':'වැරදි'}</span></div>
        ${!isCorrect ? `<div class="rline wrong"><span class="lab">ඔබේ පිළිතුර:</span><span class="val">${yourAns}</span></div>` : ''}
        <div class="rline right"><span class="lab">නිවැරදි පිළිතුර:</span><span class="val">${correctAns}</span></div>
      </div>`;
  });

  quizArea.innerHTML = `
    <div class="card">
      <div class="results-head">
        <div class="score-ring" style="--pct:${pct}"><span class="num">${pct}%</span></div>
        <div class="qnum">${score} / ${QUESTIONS.length} ලකුණු</div>
        <p class="score-sub">${verdict}</p>
      </div>
      ${filterRow}
      <div id="reviewList">${reviewHtml || '<p style="text-align:center;color:var(--cream-dim);padding:20px 0;">මෙම කාණ්ඩයේ ප්‍රශ්න නැත</p>'}</div>
      <div class="navrow" style="justify-content:center;margin-top:26px;">
        <button class="btn primary" onclick="restart()">නැවත උත්සාහ කරන්න</button>
      </div>
    </div>
  `;
}

function setFilter(f){ reviewFilter = f; renderResults(); }

function render(){
  refreshBeads();
  if(submitted) renderResults();
  else renderQuestion();
  window.scrollTo({top:0, behavior:'smooth'});
}

buildBeads();
render();
</script>
</body>
</html>
